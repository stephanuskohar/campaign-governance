<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <base target="_top" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Roboto:wght@400;500;700&display=swap"
    />
    <style>
      :root {
        --shopee-orange: #ee4d2d; --shopee-orange-dark: #d3422a; --shopee-orange-light: #f27961;
        --shopee-red: #d0011b;
        --font-primary: "Nunito", sans-serif; --font-body: "Roboto", sans-serif;
        --radius: 10px; --shadow: 0 2px 12px rgba(0,0,0,.08); --maxw: 1080px;
      }
      :root, :root[data-theme="light"] {
        --bg:#f5f5f5; --surface:#fff; --surface-2:#fafafa; --text:#1a1a1a; --text-muted:#616161;
        --border:#e3e5e8; --accent:var(--shopee-orange); --header-bg:var(--shopee-orange); --header-text:#fff;
      }
      :root[data-theme="dark"] {
        --bg:#14171c; --surface:#1e2229; --surface-2:#262b33; --text:#f1f3f5; --text-muted:#9aa4b2;
        --border:#333a44; --accent:var(--shopee-orange-light); --header-bg:#1a1d23; --header-text:#fff;
        --shadow:0 2px 14px rgba(0,0,0,.4);
      }
      * { box-sizing: border-box; }
      body { margin:0; font-family:var(--font-body); background:var(--bg); color:var(--text); line-height:1.5; }
      h1,h2,h3,.brand { font-family:var(--font-primary); font-weight:800; line-height:1.15; }
      .site-header { background:var(--header-bg); color:var(--header-text); box-shadow:var(--shadow); position:sticky; top:0; z-index:50; }
      .site-header .inner { padding:14px 28px; display:flex; align-items:center; gap:18px; }
      .brand { font-size:20px; color:var(--header-text); display:flex; align-items:center; gap:10px; text-decoration:none; }
      .brand .logo { background:#fff; color:var(--shopee-orange); width:30px; height:30px; border-radius:8px; display:grid; place-items:center; font-weight:900; font-family:var(--font-primary); }
      .nav { display:flex; gap:6px; margin-left:8px; }
      .nav a { color:var(--header-text); text-decoration:none; padding:7px 14px; border-radius:8px; font-weight:600; background:rgba(255,255,255,.18); }
      .header-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
      .icon-btn { background:rgba(255,255,255,.16); border:none; color:var(--header-text); width:38px; height:38px; border-radius:50%; cursor:pointer; font-size:17px; }
      .icon-btn:hover { background:rgba(255,255,255,.28); }
      main { margin:0 auto; padding:28px 28px 60px; }
      #view-submit { width:100%; }
      #view-list { width:100%; }
      .split { display:grid; grid-template-columns:1fr 1fr; gap:22px; align-items:start; }
      .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:24px; }
      .card h2 { margin:0 0 4px; font-size:20px; color:var(--accent); }
      .card .sub { margin:0 0 18px; color:var(--text-muted); font-size:14px; }
      .form-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
      .field { display:flex; flex-direction:column; gap:6px; }
      .field.full { grid-column:1 / -1; }
      label { font-weight:600; font-size:13px; color:var(--text-muted); }
      label .req { color:var(--shopee-red); }
      .help { position:relative; display:inline-flex; align-items:center; justify-content:center; width:15px; height:15px; margin-left:6px; border-radius:50%; background:var(--accent); color:#fff; font-size:10px; font-weight:700; cursor:help; vertical-align:middle; }
      .help::after { content:attr(data-tip); position:absolute; bottom:calc(100% + 9px); left:50%; transform:translateX(-50%); width:230px; background:var(--text); color:var(--surface); padding:9px 11px; border-radius:6px; font-size:12px; font-weight:500; line-height:1.4; text-align:left; box-shadow:var(--shadow); opacity:0; visibility:hidden; transition:opacity .12s; z-index:70; pointer-events:none; white-space:normal; }
      .help::before { content:""; position:absolute; bottom:calc(100% + 3px); left:50%; transform:translateX(-50%); border:6px solid transparent; border-top-color:var(--text); opacity:0; visibility:hidden; transition:opacity .12s; z-index:71; }
      .help:hover::after, .help:focus::after, .help:hover::before, .help:focus::before { opacity:1; visibility:visible; }
      .egg-toast { position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--text); color:var(--surface); padding:10px 18px; border-radius:999px; font-size:13px; font-weight:600; box-shadow:var(--shadow); opacity:0; transition:opacity .3s, transform .3s; z-index:200; pointer-events:none; }
      .egg-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
      input, select { font-family:var(--font-body); font-size:15px; padding:10px 12px; border:1px solid var(--border); border-radius:8px; background:var(--surface-2); color:var(--text); }
      input:focus, select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(238,77,45,.18); }
      input[readonly] { opacity:.85; cursor:not-allowed; }
      .section-label { grid-column:1 / -1; font-family:var(--font-primary); font-weight:700; color:var(--text-muted); border-bottom:1px solid var(--border); padding-bottom:4px; margin-top:4px; }
      .btn { font-family:var(--font-body); font-weight:700; font-size:15px; padding:12px 26px; border-radius:8px; border:none; cursor:pointer; }
      .btn-primary { background:var(--shopee-orange); color:#fff; }
      .btn-primary:hover { background:var(--shopee-orange-dark); }
      .btn-secondary { background:transparent; color:var(--accent); border:2px solid var(--accent); }
      .btn:disabled { opacity:.6; cursor:not-allowed; }
      .form-actions { margin-top:20px; display:flex; gap:12px; }
      .msg { padding:12px 16px; border-radius:8px; font-weight:600; font-size:14px; margin-top:16px; display:none; }
      .msg.show { display:block; }
      .msg.success { background:rgba(38,170,153,.15); color:#26aa99; }
      .msg.error { background:rgba(208,1,27,.12); color:var(--shopee-red); }
      .msg.info { background:rgba(255,187,0,.15); color:#9a7400; }
      .result-panel { position:sticky; top:88px; }
      .result-empty { text-align:center; color:var(--text-muted); padding:40px 16px; }
      .result-empty-icon { font-size:40px; margin-bottom:10px; }
      .result-empty h2 { color:var(--text); margin:0 0 6px; font-size:18px; }
      #result-content h2 { color:var(--accent); margin:0 0 14px; }
      .result-row { display:flex; justify-content:space-between; gap:16px; padding:9px 0; border-bottom:1px solid var(--border); font-size:14px; }
      .result-row .rl { color:var(--text-muted); font-weight:600; }
      .result-row .rv { color:var(--text); font-weight:700; text-align:right; word-break:break-word; }
      .result-note { margin-top:16px; padding:12px 14px; background:rgba(255,187,0,.14); border-radius:8px; color:var(--text-muted); font-size:13px; }
      .result-score { margin:16px 0; font-size:16px; font-weight:700; color:var(--text); }
      .result-score strong { color:var(--accent); }
      .result-section { margin-top:14px; }
      .result-sec-title { font-weight:700; color:var(--accent); margin-bottom:6px; }
      .result-list { margin:0; padding-left:20px; }
      .result-list li { padding:3px 0; font-size:14px; }
      .result-inline-empty { color:var(--text-muted); font-style:italic; font-size:14px; }
      .result-note-live { margin-top:12px; padding:10px 12px; background:rgba(255,187,0,.14); border-radius:8px; color:var(--text-muted); font-size:13px; }
      .ms { position:relative; }
      .ms-toggle { width:100%; display:flex; align-items:center; justify-content:space-between; gap:8px; font-family:var(--font-body); font-size:15px; padding:10px 12px; border:1px solid var(--border); border-radius:8px; background:var(--surface-2); color:var(--text); cursor:pointer; text-align:left; }
      .ms.open .ms-toggle, .ms-toggle:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(238,77,45,.18); }
      .ms-label { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .ms-label.ms-placeholder { color:var(--text-muted); }
      .ms-caret { color:var(--text-muted); font-size:12px; }
      .ms.open .ms-caret { transform:rotate(180deg); }
      .ms-panel { position:absolute; z-index:60; top:calc(100% + 4px); left:0; right:0; max-height:240px; overflow-y:auto; background:var(--surface); border:1px solid var(--border); border-radius:8px; box-shadow:var(--shadow); padding:6px; }
      .ms-option { display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:6px; cursor:pointer; font-size:14px; font-weight:500; }
      .ms-option:hover { background:var(--surface-2); }
      .ms-option input { width:16px; height:16px; accent-color:var(--shopee-orange); margin:0; }
      .ms-empty { padding:10px; color:var(--text-muted); font-style:italic; font-size:14px; }
      @media (max-width:860px){ .split{ grid-template-columns:1fr; } .result-panel{ position:static; } .form-grid{ grid-template-columns:1fr; } }
      /* Sidebar nav (hover to expand) */
      body { padding-left:56px; }
      .sidebar { position:fixed; top:0; left:0; height:100vh; width:56px; background:var(--header-bg); color:var(--header-text); z-index:80; overflow:hidden; transition:width .18s ease; box-shadow:var(--shadow); padding-top:6px; }
      .sidebar:hover { width:222px; }
      .side-burger { display:flex; align-items:center; gap:16px; padding:16px 18px; }
      .side-burger .ico { font-size:22px; }
      .side-burger .lbl, .side-item .lbl { opacity:0; transition:opacity .15s; white-space:nowrap; }
      .sidebar:hover .side-burger .lbl, .sidebar:hover .side-item .lbl { opacity:1; }
      .side-burger .lbl { font-family:var(--font-primary); font-weight:800; }
      .side-item { display:flex; align-items:center; gap:16px; padding:14px 18px; cursor:pointer; color:var(--header-text); border:none; background:none; width:100%; text-align:left; font-family:var(--font-body); font-size:15px; font-weight:600; }
      .side-item .ico { font-size:20px; min-width:22px; text-align:center; }
      .side-item:hover { background:rgba(255,255,255,.14); }
      .side-item.active { background:rgba(255,255,255,.24); }
      /* Campaign list */
      .filter-bar { display:flex; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
      .filter-bar input { flex:1; min-width:240px; }
      .list-count { color:var(--text-muted); font-size:13px; margin-bottom:10px; }
      .table-wrap { overflow:auto; max-height:65vh; border:1px solid var(--border); border-radius:8px; }
      table.cg { width:100%; border-collapse:collapse; font-size:13px; }
      table.cg { table-layout:fixed; }
      table.cg th, table.cg td { text-align:left; padding:9px 12px; border-bottom:1px solid var(--border); vertical-align:top; word-break:break-word; overflow-wrap:anywhere; }
      table.cg th.col-head { color:var(--text-muted); font-weight:700; position:sticky; top:0; z-index:2; background:var(--surface-2); }
      table.cg tr.filters th { position:sticky; top:37px; z-index:1; background:var(--surface); padding:6px 8px; }
      table.cg .col-filter { width:100%; min-width:0; padding:6px 8px; font-size:12px; }
      table.cg tbody tr:hover { background:var(--surface-2); }
      table.cg tbody tr:last-child td { border-bottom:none; }
    </style>
  </head>
  <body>
    <nav class="sidebar" id="sidebar">
      <div class="side-burger"><span class="ico">☰</span><span class="lbl">Menu</span></div>
      <button class="side-item active" data-view="submit" type="button"><span class="ico">📝</span><span class="lbl">Submit Campaign</span></button>
      <button class="side-item" data-view="list" type="button"><span class="ico">📋</span><span class="lbl">Campaigns</span></button>
    </nav>

    <header class="site-header">
      <div class="inner">
        <span class="brand"><span class="logo">S</span> Campaign Governance</span>
        <div class="header-right">
          <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme">🌙</button>
        </div>
      </div>
    </header>

    <main>
      <div id="view-submit">
      <div class="split">
        <section class="card result-panel">
          <div class="result-empty" id="result-empty">
            <div class="result-empty-icon">📋</div>
            <h2>Your results appear here</h2>
            <p>Fill in the form and submit to record your campaign.</p>
          </div>
          <div id="result-content" style="display:none"></div>
        </section>

        <section class="card">
          <h2>Submit a campaign</h2>
          <p class="sub"></p>
          <form id="campaign-form" novalidate>
            <div class="form-grid">
              <div class="field full">
                <label for="f-user">User (your email)</label>
                <input id="f-user" type="email" value="<?= userEmail ?>" readonly />
              </div>
              <div class="field">
                <label>Campaign Intent <span class="req">*</span></label>
                <div id="ms-intent"></div>
              </div>
              <div class="field">
                <label for="f-type">Campaign Type <span class="req">*</span></label>
                <select id="f-type" required><option value="" disabled selected>— select —</option></select>
              </div>
              <div class="field full">
                <label for="f-name">Campaign Name <span class="req">*</span></label>
                <input id="f-name" type="text" required />
              </div>
              <div class="field">
                <label for="f-start">Campaign Start Date <span class="req">*</span></label>
                <input id="f-start" type="date" required />
              </div>
              <div class="field">
                <label for="f-end">Campaign End Date <span class="req">*</span></label>
                <input id="f-end" type="date" required />
              </div>
              <div class="field">
                <label for="f-gmv">GMV ($) <span class="req">*</span><span class="help" tabindex="0" data-tip="Average daily GMV during the campaign period. If not applicable, fill with 0.">?</span></label>
                <input id="f-gmv" type="number" min="0" step="any" required />
              </div>
              <div class="field">
                <label for="f-a1">A1 <span class="req">*</span><span class="help" tabindex="0" data-tip="Average daily A1 during the campaign period. If not applicable, fill with 0.">?</span></label>
                <input id="f-a1" type="number" min="0" step="any" required />
              </div>
              <div class="field full">
                <label for="f-budget">Budget ($) <span class="req">*</span><span class="help" tabindex="0" data-tip="Total campaign budget. If not applicable, fill with 0.">?</span></label>
                <input id="f-budget" type="number" min="0" step="any" required />
              </div>
              <div class="field full section-label">Seller Investment ($)</div>
              <div class="field">
                <label for="f-cash">Cash <span class="req">*</span><span class="help" tabindex="0" data-tip="Seller investment in cash. If not applicable, fill with 0.">?</span></label>
                <input id="f-cash" type="number" min="0" step="any" required />
              </div>
              <div class="field">
                <label for="f-prm">Promissed PRM <span class="req">*</span><span class="help" tabindex="0" data-tip="Seller investment via promised PRM. If not applicable, fill with 0.">?</span></label>
                <input id="f-prm" type="number" min="0" step="any" required />
              </div>
              <div class="field full">
                <label for="f-barter">Marketing Barter <span class="req">*</span><span class="help" tabindex="0" data-tip="Seller investment via marketing barter. If not applicable, fill with 0.">?</span></label>
                <input id="f-barter" type="number" min="0" step="any" required />

            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary" id="submit-btn">Submit campaign</button>
              <button type="reset" class="btn btn-secondary">Clear</button>

            <div class="msg" id="form-msg"></div>
          </form>
        </section>
      </div>
      </div>

      <div id="view-list" style="display:none">
        <section class="card">
          <h2>Submitted campaigns</h2>
          <p class="sub">All recorded campaigns.</p>
          <div class="filter-bar">
            <button class="btn btn-secondary" id="list-refresh" type="button">Refresh</button>
            <button class="btn btn-secondary" id="list-clear" type="button">Clear filters</button>
          </div>
          <div class="list-count" id="list-count"></div>
          <div class="table-wrap"><table class="cg" id="list-table"><thead></thead><tbody></tbody></table></div>
          <div class="msg" id="list-msg"></div>
        </section>
      </div>
    </main>

    <div class="egg-toast" id="egg"></div>

    <script>
      // ---- Config ----
      var ALLOWED_DOMAIN = "shopee.com", MIN_DAYS = 0, MAX_DAYS = 365;

      // ---- Theme ----
      (function () {
        var saved = localStorage.getItem("cg_theme");
        if (saved) document.documentElement.setAttribute("data-theme", saved);
        function cur() { return document.documentElement.getAttribute("data-theme") || "light"; }
        function upd() { document.getElementById("theme-toggle").textContent = cur() === "dark" ? "☀️" : "🌙"; }
        document.getElementById("theme-toggle").addEventListener("click", function () {
          var t = cur() === "dark" ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", t);
          localStorage.setItem("cg_theme", t); upd();
        });
        upd();
      })();

      // ---- google.script.run as promises ----
      function gs(method) {
        var args = Array.prototype.slice.call(arguments, 1);
        return new Promise(function (resolve, reject) {
          google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[method].apply(null, args);
        });
      }

      // ---- MultiSelect ----
      var instances = [];
      function closeAll() { instances.forEach(function (i) { i._close(); }); }
      document.addEventListener("click", closeAll);
      function createMS(container, placeholder) {
        container.classList.add("ms");
        container.innerHTML = '<button type="button" class="ms-toggle"><span class="ms-label"></span><span class="ms-caret">▾</span></button><div class="ms-panel" hidden></div>';
        var toggle = container.querySelector(".ms-toggle"), label = container.querySelector(".ms-label"), panel = container.querySelector(".ms-panel");
        function renderLabel() {
          var v = getValues();
          if (!v.length) { label.textContent = placeholder; label.classList.add("ms-placeholder"); }
          else { label.classList.remove("ms-placeholder"); label.textContent = v.length <= 2 ? v.join(", ") : v.length + " selected"; }
        }
        function setOptions(list) {
          panel.innerHTML = "";
          if (!list || !list.length) { panel.innerHTML = '<div class="ms-empty">No options available.</div>'; }
          else list.forEach(function (o) {
            var row = document.createElement("label"); row.className = "ms-option";
            var inp = document.createElement("input"); inp.type = "checkbox"; inp.value = o;
            inp.addEventListener("change", renderLabel);
            var sp = document.createElement("span"); sp.textContent = o;
            row.appendChild(inp); row.appendChild(sp); panel.appendChild(row);
          });
          renderLabel();
        }
        function getValues() { return Array.prototype.slice.call(panel.querySelectorAll("input:checked")).map(function (c) { return c.value; }); }
        function clear() { panel.querySelectorAll("input:checked").forEach(function (c) { c.checked = false; }); renderLabel(); }
        toggle.addEventListener("click", function (e) { e.stopPropagation(); var h = panel.hidden; closeAll(); if (h) { panel.hidden = false; container.classList.add("open"); } });
        panel.addEventListener("click", function (e) { e.stopPropagation(); });
        var api = { setOptions: setOptions, getValues: getValues, clear: clear, _close: function () { panel.hidden = true; container.classList.remove("open"); } };
        instances.push(api); renderLabel(); return api;
      }

      // ---- Page logic ----
      var el = function (id) { return document.getElementById(id); };
      var msg = el("form-msg"), form = el("campaign-form"), submitBtn = el("submit-btn");
      var intentMS = createMS(el("ms-intent"), "Select intent(s)…");
      function fillTypeSelect(list) {
        var sel = el("f-type");
        sel.innerHTML = '<option value="" disabled selected>— select —</option>';
        (list || []).forEach(function (o) {
          var opt = document.createElement("option"); opt.value = o; opt.textContent = o; sel.appendChild(opt);
        });
      }
      function showMsg(k, t) { msg.className = "msg show " + k; msg.textContent = t; }
      function hideMsg() { msg.className = "msg"; msg.textContent = ""; }

      gs("getOptions").then(function (o) {
        intentMS.setOptions(o.intents || []); fillTypeSelect(o.types || []);
      }).catch(function (e) {
        intentMS.setOptions([]); fillTypeSelect([]);
        showMsg("error", "Could not load Intent/Type options: " + (e.message || e));
      });

      function genId() {
        var a = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789", f = "ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789";
        var id = f[Math.floor(Math.random() * f.length)];
        for (var i = 1; i < 10; i++) id += a[Math.floor(Math.random() * a.length)];
        return id;
      }
      function days(s, e) { return Math.round((new Date(e) - new Date(s)) / 86400000); }
      function num(id) { return parseFloat(el(id).value); }

      function validate(v) {
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.user)) return "Your account email is missing or invalid.";
        if (v.user.toLowerCase().indexOf("@" + ALLOWED_DOMAIN) === -1) return "Email must be on the @" + ALLOWED_DOMAIN + " domain.";
        if (!v.intents.length) return "Select at least one Campaign Intent.";
        if (!v.type) return "Select a Campaign Type.";
        if (!v.name) return "Enter a Campaign Name.";
        if (!v.start) return "Choose a Campaign Start Date.";
        if (!v.end) return "Choose a Campaign End Date.";
        var d = days(v.start, v.end);
        if (d < MIN_DAYS) return "Campaign Start Date must be on or before the End Date.";
        if (d > MAX_DAYS) return "Campaign cannot be longer than " + MAX_DAYS + " days (currently " + d + ").";
        var nums = { "GMV ($)": ["f-gmv", v.gmv], "A1": ["f-a1", v.a1], "Budget ($)": ["f-budget", v.budget], "Seller Investment - Cash": ["f-cash", v.cash], "Seller Investment - Promissed PRM": ["f-prm", v.prm], "Seller Investment - Marketing Barter": ["f-barter", v.barter] };
        for (var k in nums) { if (el(nums[k][0]).value === "" || isNaN(nums[k][1])) return k + " must be a number."; if (nums[k][1] < 0) return k + " cannot be negative."; }
        return null;
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault(); hideMsg();
        var v = {
          user: el("f-user").value.trim(), intents: intentMS.getValues(), type: el("f-type").value,
          name: el("f-name").value.trim(), start: el("f-start").value, end: el("f-end").value,
          gmv: num("f-gmv"), a1: num("f-a1"), budget: num("f-budget"), cash: num("f-cash"), prm: num("f-prm"), barter: num("f-barter")
        };
        var err = validate(v); if (err) { showMsg("error", err); return; }
        var id = genId(), intentStr = v.intents.join(", "), typeStr = v.type;
        var fields = {
          "User": v.user, "Campaign Intent": intentStr, "Campaign Type": typeStr, "Name": v.name,
          "Campaign Start Date": v.start, "Campaign End Date": v.end,
          "GMV ($)": v.gmv, "A1": v.a1, "Budget ($)": v.budget,
          "Seller Investment ($) - Cash": v.cash, "Seller Investment ($) - Promissed PRM": v.prm,
          "Seller Investment ($) - Marketing Barter": v.barter, "ID": id
        };
        submitBtn.disabled = true; submitBtn.textContent = "Submitting…";
        gs("submitCampaign", fields).then(function (res) {
          var submitted = {
            "ID": res.id || id, "User": v.user, "Date": res.date || "",
            "Campaign Intent": intentStr, "Campaign Type": typeStr, "Name": v.name,
            "Campaign Start Date": v.start, "Campaign End Date": v.end,
            "# Days": String(days(v.start, v.end))
          };
          renderResult(res, submitted);
          form.reset(); intentMS.clear(); el("f-user").value = v.user;
          showMsg("success", "Campaign submitted successfully (ID: " + (res.id || id) + ").");
        }).catch(function (e2) {
          showMsg("error", (e2 && e2.message) || String(e2));
        }).then(function () {
          submitBtn.disabled = false; submitBtn.textContent = "Submit";
        });
      });

      function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]; }); }
      function rrow(l, val) { return '<div class="result-row"><span class="rl">' + esc(l) + '</span><span class="rv">' + esc(val) + "</span></div>"; }
      function fmtScore(v) { var n = Number(v); return (v === "" || v == null || isNaN(n)) ? esc(v) : n.toFixed(2); }
      var IDENTITY = ["ID", "User", "Date", "Campaign Intent", "Campaign Type", "Name", "Campaign Start Date", "Campaign End Date", "# Days"];
      function renderResult(res, submitted) {
        el("result-empty").style.display = "none";
        var rc = el("result-content"); rc.style.display = "block";
        var R = (res && res.result) || { found: false };
        var head = R.found ? R.header : submitted;
        var html = "<h2>Your Campaign</h2>";
        IDENTITY.forEach(function (k) { html += rrow(k, head[k]); });
        if (R.found) {
          html += '<div class="result-score">Score result: <strong>' + fmtScore(head["Score"]) + "</strong></div>";
          html += '<div class="result-section"><div class="result-sec-title">You are eligible to get:</div><ul class="result-list">';
          (R.basic || []).forEach(function (b) { html += "<li>" + esc(b.label) + ": <strong>" + esc(b.value) + "</strong></li>"; });
          html += "</ul></div>";
          html += '<div class="result-section"><div class="result-sec-title">And also these additional asset:</div>';
          if (R.additional && R.additional.length) {
            html += '<ul class="result-list">';
            R.additional.forEach(function (a) { html += "<li>" + esc(a) + "</li>"; });
            html += "</ul>";
          } else {
            html += '<div class="result-inline-empty">None.</div>';
          }
          html += "</div>";
        } else {
          html += '<div class="result-note-live">Submitted. Your result is still being computed — reopen the app in a moment to see the full score and eligibility.</div>';
        }
        rc.innerHTML = html;
      }

      // ---- Sidebar view switching ----
      (function () {
        var items = document.querySelectorAll(".side-item");
        var views = { submit: document.getElementById("view-submit"), list: document.getElementById("view-list") };
        var listLoaded = false;
        function show(name) {
          for (var k in views) views[k].style.display = (k === name) ? "" : "none";
          items.forEach(function (it) { it.classList.toggle("active", it.getAttribute("data-view") === name); });
          if (name === "list" && !listLoaded) { listLoaded = true; loadCampaigns(); }
        }
        items.forEach(function (it) { it.addEventListener("click", function () { show(it.getAttribute("data-view")); }); });
      })();

      // ---- Campaign list (Web Read A:J, read only) — per-column filters ----
      var listData = { headers: [], rows: [] };
      function loadCampaigns() {
        var m = el("list-msg"); m.className = "msg show info"; m.textContent = "Loading…";
        gs("getCampaigns").then(function (res) {
          listData = res || { headers: [], rows: [] };
          el("list-table").querySelector("thead").innerHTML =
            "<tr>" + listData.headers.map(function (h) { return '<th class="col-head">' + esc(h) + "</th>"; }).join("") + "</tr>" +
            '<tr class="filters">' + listData.headers.map(function (h, i) {
              return '<th><input class="col-filter" data-col="' + i + '" type="text" placeholder="Filter" /></th>';
            }).join("") + "</tr>";
          applyListFilter();
          m.className = "msg"; m.textContent = "";
        }).catch(function (e) { m.className = "msg show error"; m.textContent = (e && e.message) || String(e); });
      }
      function applyListFilter() {
        var filters = [];
        el("list-table").querySelectorAll(".col-filter").forEach(function (inp) {
          var q = (inp.value || "").trim().toLowerCase();
          if (q) filters.push({ col: Number(inp.getAttribute("data-col")), q: q });
        });
        var rows = listData.rows.filter(function (r) {
          return filters.every(function (f) { return String(r[f.col] == null ? "" : r[f.col]).toLowerCase().indexOf(f.q) !== -1; });
        });
        el("list-table").querySelector("tbody").innerHTML = rows.map(function (r) {
          return "<tr>" + r.map(function (c, i) {
            return "<td>" + (listData.headers[i] === "Score" ? fmtScore(c) : esc(c)) + "</td>";
          }).join("") + "</tr>";
        }).join("");
        el("list-count").textContent = rows.length + " of " + listData.rows.length + " campaigns";
      }
      // Delegated listener survives thead re-render.
      el("list-table").querySelector("thead").addEventListener("input", applyListFilter);
      el("list-refresh").addEventListener("click", loadCampaigns);
      el("list-clear").addEventListener("click", function () {
        el("list-table").querySelectorAll(".col-filter").forEach(function (i) { i.value = ""; });
        applyListFilter();
      });

      // ---- Easter egg (subtle): console signature + 5 clicks on the logo ----
      (function () {
        try {
          console.log("%cCampaign Governance", "color:#ee4d2d;font-weight:800;font-size:15px");
          console.log("%ccrafted with 🧡 by Stephanus Kohar", "color:#888;font-size:12px");
        } catch (e) {}
        var brand = document.querySelector(".brand"), egg = document.getElementById("egg");
        if (!brand || !egg) return;
        var n = 0, t;
        brand.style.cursor = "pointer";
        brand.addEventListener("click", function () {
          n++; clearTimeout(t); t = setTimeout(function () { n = 0; }, 1200);
          if (n >= 5) {
            n = 0;
            egg.textContent = "Crafted with 🧡 by Stephanus Kohar";
            egg.classList.add("show");
            clearTimeout(egg._h); egg._h = setTimeout(function () { egg.classList.remove("show"); }, 2600);
          }
        });
      })();
    </script>
  </body>
</html>
